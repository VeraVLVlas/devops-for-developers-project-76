- name: Deploy Redmine application
  hosts: all
  become: true

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      tags: [setup]

  roles:
    - role: geerlingguy.pip
      tags: [setup]
    - role: geerlingguy.docker
      tags: [setup]

  tasks:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ redmine_app_dir }}"
        state: directory
        mode: "0755"
      tags: [deploy]

    - name: Create Redmine env file from template
      ansible.builtin.template:
        src: templates/redmine.env.j2
        dest: "{{ redmine_app_dir }}/.env"
        mode: "0600"
      tags: [deploy]

    - name: Run Redmine container
      ansible.builtin.shell: |
        docker rm -f redmine || true
        docker run -d \
          --name redmine \
          --restart always \
          --env-file {{ redmine_app_dir }}/.env \
          -p {{ redmine_port }}:3000 \
          redmine
      changed_when: true
      tags: [deploy]

- name: Install Datadog agent
  hosts: webservers
  become: true

  roles:
    - role: datadog.datadog
      tags: [monitoring]
