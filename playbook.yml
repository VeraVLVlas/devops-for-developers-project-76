- hosts: all
  become: true

  collections:
    - community.docker

  vars:
    pip_install_packages:
      - name: docker

  roles:
    - role: geerlingguy.pip
      tags: [setup]
    - role: geerlingguy.docker
      tags: [setup]

  tasks:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{redmine_app_dir}}"
        state: directory
        mode: "0755"
      tags: [deploy]

    - name: Create Redmine env file from template
      ansible.builtin.template:
        src: templates/redmine.env.j2
        dest: "{{redmine_app_dir}}/.env"
        mode: "0600"
      tags: [deploy]

    - name: Run Redmine container
      community.docker.docker_container:
        name: redmine
        image: redmine
        state: started
        recreate: true
        restart_policy: always
        published_ports:
          - "{{ redmine_port }}:3000"
        env_file: "{{redmine_app_dir}}/.env"
      tags: [deploy]
